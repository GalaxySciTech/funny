version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: quizmaster_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27018}:27017"
    environment:
      MONGO_INITDB_DATABASE: quizmaster

  backend:
    build:
      context: ./backend
    container_name: quizmaster_backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/quizmaster
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

volumes:
  mongo_data:
