version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizmaster_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizmaster
      POSTGRES_PASSWORD: quizmaster
      POSTGRES_DB: quizmaster
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: quizmaster_backend
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://quizmaster:quizmaster@postgres:5432/quizmaster
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}

volumes:
  pg_data:
